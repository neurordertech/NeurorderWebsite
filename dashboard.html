<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Dashboard | Neurorder Intelligence</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
 
  <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2116967709675155"
crossorigin="anonymous"></script>
</head>

<body>

<section class="auth-page">

  <div class="auth-card">

    <img src="images/logo.png" class="auth-logo">

    <p class="auth-eyebrow">NEURORDER INTELLIGENCE</p>

    <h1 id="dashboardTitle">Loading...</h1>

    <p class="auth-subtitle">
      Your personal intelligence dashboard is now being built.
    </p>

    <button class="auth-primary-btn" onclick="window.location.href='news.html'">
      Open Intelligence Feed
    </button>

    <button class="social-auth-btn" onclick="logout()">
      Sign Out
    </button>

  </div>

</section>

<script>
async function loadUser() {
  const { data } = await supabaseClient.auth.getUser();

  if (!data.user) {
    window.location.href = "login.html";
    return;
  }

  const name =
    data.user.user_metadata.full_name ||
    data.user.email;

  document.getElementById("dashboardTitle").textContent =
    "Welcome, " + name;
}

loadUser();
</script>

</body>
</html>
