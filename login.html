<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Neurorder</title>

  <link rel="stylesheet" href="css/auth.css">
<link rel="icon" href="images/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="512x512" href="images/favicon.png">
<link rel="apple-touch-icon" href="images/favicon.png">

</head>
<body class="auth-page">

  <main class="auth-card">

    <div class="auth-logo-wrap">
      <img src="images/logo.png" alt="Neurorder Logo" class="auth-logo login-logo">
    </div>

    <p class="auth-kicker">NEURORDER INTELLIGENCE</p>

    <h1>Welcome back.</h1>

    <p>
      Sign in to continue to your dashboard, saved research,
      AI tools, and Neurorder Intelligence.
    </p>

    <form id="loginForm" onsubmit="event.preventDefault(); loginWithEmail();">

      <input 
        type="email" 
        id="loginEmail" 
        placeholder="Email address" 
        required
      >

      <input 
        type="password" 
        id="loginPassword" 
        placeholder="Password" 
        required
      >

      <button type="submit" class="primary-auth-btn">
        Sign In
      </button>

    </form>

    <button class="google-auth-btn" onclick="loginWithGoogle()">
      Continue with Google
    </button>

    <p class="auth-switch">
      Don’t have an account?
      <a href="signup.html">Create one</a>
    </p>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>

</body>
